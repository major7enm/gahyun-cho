<main>
  <div class="journal-wrap">

    <article id="post-article" class="journal-post"></article>

    <section id="comments-app" class="comments" data-post-id="">
      <h2 class="comments-title">COMMENTS</h2>
      <p class="comments-lead">글을 읽고 마음이 머물렀다면, 짧은 화답을 남겨 주세요.</p>
      <p class="comments-status"></p>
      <div class="comments-list"></div>
      <form class="comment-form" autocomplete="off">
        <input type="text" name="name" maxlength="20" placeholder="이름 (선택)">
        <textarea name="message" maxlength="800" rows="4" placeholder="내용을 입력해 주세요" required></textarea>
        <input type="text" name="website" class="hp-field" tabindex="-1" aria-hidden="true">
        <div class="comment-form-actions">
          <span class="form-note"></span>
          <button type="submit">남기기</button>
        </div>
      </form>
    </section>

    <p class="journal-back"><a href="journal.html">&larr; JOURNAL</a></p>

  </div>
</main>

<script src="js/journal-posts.js"></script>
<script>
(function () {
  var article = document.getElementById('post-article');
  var commentsApp = document.getElementById('comments-app');
  var posts = window.JOURNAL_POSTS || [];
  var id = new URLSearchParams(location.search).get('id');
  var post = null;
  for (var i = 0; i < posts.length; i++) {
    if (posts[i].id === id) { post = posts[i]; break; }
  }

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  if (!post) {
    var notice = el('p', 'journal-empty', '글을 찾을 수 없습니다.');
    article.appendChild(notice);
    commentsApp.style.display = 'none';
    return;
  }

  document.title = post.title + ' | GAHYUN CHO';

  var meta = el('div', 'journal-item-meta');
  meta.appendChild(el('span', 'journal-item-category', post.category));
  meta.appendChild(el('span', 'journal-item-date', post.date));
  article.appendChild(meta);
  article.appendChild(el('h1', 'journal-post-title', post.title));

  var body = el('div', 'journal-post-body');
  (post.body || []).forEach(function (paragraph) {
    var p = document.createElement('p');
    var lines = String(paragraph).split('\n');
    lines.forEach(function (line, index) {
      if (index > 0) p.appendChild(document.createElement('br'));
      p.appendChild(document.createTextNode(line));
    });
    body.appendChild(p);
  });
  article.appendChild(body);

  commentsApp.setAttribute('data-post-id', post.id);
})();
</script>
<script src="js/firebase-config.js"></script>
<script src="js/comments.js"></script>

</body>
