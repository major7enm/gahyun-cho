<script src="js/journal-posts.js"></script>
<script>
(function () {
  var listEl = document.getElementById('journal-list');
  var posts = window.JOURNAL_POSTS || [];

  function el(tag, className, text) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  if (!posts.length) {
    listEl.appendChild(el('p', 'journal-empty', '아직 올라온 글이 없습니다.'));
    return;
  }

  posts.forEach(function (post) {
    var item = el('article', 'journal-item');
    var meta = el('div', 'journal-item-meta');
    meta.appendChild(el('span', 'journal-item-category', post.category));
    meta.appendChild(el('span', 'journal-item-date', post.date));

    var titleLink = el('a', 'journal-item-title', post.title);
    titleLink.href = 'journal-post.html?id=' + encodeURIComponent(post.id);

    var firstParagraph = (post.body && post.body[0]) ? post.body[0].split('\n')[0] : '';
    var excerptText = firstParagraph.length > 70 ? firstParagraph.slice(0, 70) + '…' : firstParagraph;

    item.appendChild(meta);
    item.appendChild(titleLink);
    item.appendChild(el('p', 'journal-item-excerpt', excerptText));
    listEl.appendChild(item);
  });
})();
</script>
